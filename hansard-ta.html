    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f8f9fa;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 20%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #1e3c72;
        }

        .site-title {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 2px solid transparent;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            border-color: white;
        }

        .nav-link.back-home {
            border-color: white;
        }

        .nav-link.back-home:hover {
            background: white;
            color: #1e3c72;
        }

        /* Page Header */
         .page-header {
            margin-top: 100px;
            background: linear-gradient(135deg, 
                #6a11cb 0%,
                #2575fc 25%,
                #00d4ff 50%,
                #7c3aed 75%,
                #ec4899 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: white;
            text-align: center;
            padding: 5rem 0;
            position: relative;
            overflow: hidden;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }


        .page-header h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            animation: fadeInUp 1s ease;
        }

        .page-header .subtitle {
            font-size: 1.5rem;
            opacity: 0.9;
            animation: fadeInUp 1s ease 0.2s both;
        }

        /* Main Content */
        .main-content {
            padding: 4rem 0;
        }

        .section {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 2rem;
            color: #1e3c72;
            margin-bottom: 1.5rem;
            position: relative;
            padding-bottom: 0.5rem;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background: #ff6b35;
            border-radius: 2px;
        }

        /* Year Selector */
        .year-dropdown-container {
            max-width: 400px;
            position: relative;
        }

        .year-dropdown {
            width: 100%;
            padding: 1rem 3rem 1rem 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: #f8fafc;
            color: #475569;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            appearance: none;
        }

        .year-dropdown:hover {
            background-color: #e2e8f0;
            border-color: #cbd5e1;
            transform: translateY(-2px);
        }

        .year-dropdown:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .dropdown-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #475569;
            font-size: 1.2rem;
        }

        /* Filter Section */
        .filter-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
        }

        .form-group select,
        .form-group input {
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        /* Results */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .results-summary {
            color: #1e3c72;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .results-count {
            color: #6b7280;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        /* Month Sections */
        .month-section {
            margin-bottom: 3rem;
        }

        .month-header {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #3b82f6;
        }

        .month-title {
            color: #1e3c72;
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .month-count {
            background: #3b82f6;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        /* Hansard Items with Download and Open Buttons */
        .hansard-item {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .hansard-item:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .hansard-title {
            color: #1e3c72;
            font-size: 1.1rem;
            font-weight: 600;
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .download-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-shrink: 0;
        }

        .download-btn, .open-btn {
            padding: 0.6rem 1rem;
            border: 2px solid;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            background: white;
        }

        .download-btn {
            border-color: #dc2626;
            color: #dc2626;
        }

        .download-btn:hover {
            background: #fef2f2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }

        .open-btn {
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .open-btn:hover {
            background: #eff6ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .download-btn.downloading {
            opacity: 0.7;
            cursor: not-allowed;
            border-color: #f59e0b;
            color: #f59e0b;
            background: #fffbeb;
        }

        .download-btn.success {
            border-color: #059669;
            color: #059669;
            background: #f0fdfa;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #6b7280;
        }

        .no-results h3 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .nav-links {
                flex-direction: column;
                width: 100%;
            }

            .page-header h1 {
                font-size: 2.5rem;
            }

            .page-header .subtitle {
                font-size: 1.2rem;
            }

            .container {
                padding: 0 1rem;
            }

            .filter-controls {
                grid-template-columns: 1fr;
            }

            .results-header {
                flex-direction: column;
                align-items: stretch;
            }

            .hansard-item {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }

            .hansard-title {
                text-align: center;
            }

            .download-actions {
                justify-content: center;
            }

            .download-btn, .open-btn {
                flex: 1;
                justify-content: center;
            }
        }

        /* Skip Link for Accessibility */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 6px;
            background: #1e3c72;
            color: white;
            padding: 8px;
            text-decoration: none;
            border-radius: 4px;
        }

        .skip-link:focus {
            top: 6px;
        }
    </style>

let currentYear = null;
let filteredData = [];

// Initialize the application
function init() {
    generateYearDropdown();
    setupEventListeners();
}

// Generate year dropdown options
function generateYearDropdown() {
    const yearDropdown = document.getElementById('yearDropdown');
    const years = Object.keys(hansardData).sort((a, b) => b - a);
    
    years.forEach(year => {
        const option = document.createElement('option');
        option.value = year;
        option.textContent = year;
        yearDropdown.appendChild(option);
    });
}

// Select a year
function selectYear(year) {
    currentYear = year;
    
    if (!year) {
        document.getElementById('filterSection').style.display = 'none';
        document.getElementById('hansardResults').style.display = 'none';
        return;
    }

    document.getElementById('filterSection').style.display = 'block';
    document.getElementById('hansardResults').style.display = 'block';
    
    loadHansards();
}

// Load hansards for selected year
function loadHansards() {
    const yearData = hansardData[currentYear] || {};
    const chamber = document.getElementById('chamber').value;
    const month = document.getElementById('month').value;
    const keywords = document.getElementById('keywords').value.toLowerCase();

    filteredData = [];
    Object.entries(yearData).forEach(([monthKey, records]) => {
        if (month && monthKey !== month) return;
        
        records.forEach(record => {
            if (chamber && record.chamber !== chamber) return;
            if (keywords && !record.title.toLowerCase().includes(keywords)) return;
            
            filteredData.push({...record, month: monthKey});
        });
    });

    displayHansards();
}

// Display hansards grouped by month
function displayHansards() {
    const resultsSummary = document.getElementById('resultsSummary');
    const resultsCount = document.getElementById('resultsCount');
    const hansardList = document.getElementById('hansardList');

    resultsSummary.textContent = `ஹான்சாட் அறிக்கை ${currentYear}`;
    resultsCount.textContent = `${filteredData.length} அறிக்கைகள்`;

    if (filteredData.length === 0) {
        hansardList.innerHTML = `
            <div class="no-results">
                <h3>No records found</h3>
                <p>Try adjusting your filters or selecting a different year.</p>
            </div>
        `;
        return;
    }

    // Group by month
    const groupedByMonth = {};
    filteredData.forEach(record => {
        if (!groupedByMonth[record.month]) {
            groupedByMonth[record.month] = [];
        }
        groupedByMonth[record.month].push(record);
    });

    // Sort months in descending order
    const sortedMonths = Object.keys(groupedByMonth).sort((a, b) => b - a);

    hansardList.innerHTML = '';

    sortedMonths.forEach(monthKey => {
        const monthName = getMonthName(monthKey);
        const records = groupedByMonth[monthKey];

        const monthSection = document.createElement('div');
        monthSection.className = 'month-section';
        
        monthSection.innerHTML = `
            <div class="month-header">
                <div class="month-title">
                    ${monthName} ${currentYear}
                    <span class="month-count">${records.length} வர்தா</span>
                </div>
            </div>
        `;

        records.forEach(record => {
            const hansardItem = createHansardItem(record);
            monthSection.appendChild(hansardItem);
        });

        hansardList.appendChild(monthSection);
    });
}

// Create hansard item with download and open buttons
function createHansardItem(record) {
    const item = document.createElement('div');
    item.className = 'hansard-item';

    const fileIcon = getFileIcon(record.fileType);

    item.innerHTML = `
        <div class="hansard-title">
            ${fileIcon} ${record.title} - ${formatDate(record.date)}
        </div>
        <div class="download-actions">
            <button class="download-btn" onclick="downloadFile('${record.fileUrl}', '${record.date}', this)">
                <i class="fas fa-download"></i> பதிவிறக்கம்
            </button>
            <a href="${record.fileUrl}" target="_blank" class="open-btn">
                <i class="fas fa-external-link-alt"></i> திறந்த
            </a>
        </div>
    `;

    return item;
}

// Get file icon based on file type
function getFileIcon(fileType) {
    const icons = {
        'pdf': '<i class="fas fa-file-pdf" style="color: #dc2626;"></i>',
        'doc': '<i class="fas fa-file-word" style="color: #2563eb;"></i>',
        'docx': '<i class="fas fa-file-word" style="color: #2563eb;"></i>',
        'txt': '<i class="fas fa-file-alt" style="color: #6b7280;"></i>',
        'default': '<i class="fas fa-file" style="color: #9ca3af;"></i>'
    };
    return icons[fileType] || icons['default'];
}

// Setup event listeners
function setupEventListeners() {
    document.getElementById('yearDropdown').addEventListener('change', (e) => selectYear(e.target.value));
    document.getElementById('chamber').addEventListener('change', loadHansards);
    document.getElementById('month').addEventListener('change', loadHansards);
    document.getElementById('keywords').addEventListener('input', debounce(loadHansards, 300));
}

// Utility functions
function getMonthName(monthKey) {
    const months = {
    '01': 'ஜனவரி', '02': 'பிப்ரவரி', '03': 'மார்ச்', '04': 'ஏப்ரல்',
    '05': 'மே', '06': 'ஜூன்', '07': 'ஜூலை', '08': 'ஆகஸ்ட்',
    '09': 'செப்டம்பர்', '10': 'அக்டோபர்', '11': 'நவம்பர்', '12': 'டிசம்பர்'
};
    return months[monthKey];
}

// Fixed formatDate function - timezone independent
function formatDate(dateStr) {
    // Parse date manually to avoid timezone issues
    const [year, month, day] = dateStr.split('-');
    
const months = {
    '01': 'ஜனவரி', '02': 'பிப்ரவரி', '03': 'மார்ச்', '04': 'ஏப்ரல்',
    '05': 'மே', '06': 'ஜூன்', '07': 'ஜூலை', '08': 'ஆகஸ்ட்',
    '09': 'செப்டம்பர்', '10': 'அக்டோபர்', '11': 'நவம்பர்', '12': 'டிசம்பர்'
};
    
    const weekdays = ['ஞாயிறு', 'திங்கள்', 'செவ்வாய்', 'புதன்', 'வியாழன்', 'வெள்ளி', 'சனி'];
    
    // Create date in UTC to avoid timezone shifts
    const date = new Date(Date.UTC(parseInt(year), parseInt(month) - 1, parseInt(day)));
    const dayOfWeek = weekdays[date.getUTCDay()];
    
    return `${dayOfWeek}, ${months[month]} ${parseInt(day)}, ${year}`;
}

function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
        const later = () => {
            clearTimeout(timeout);
            func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
    };
}

// Enhanced download function
function downloadFile(url, date, btn) {
    const originalHTML = btn.innerHTML;
    
    // Show downloading state
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Downloading...';
    btn.classList.add('downloading');
    btn.disabled = true;
    
    // Create a temporary link element to trigger download
    const link = document.createElement('a');
    link.href = url;
    link.download = `hansard-${date}.pdf`; // Suggest filename
    link.style.display = 'none';
    document.body.appendChild(link);
    
    // Trigger download
    link.click();
    document.body.removeChild(link);
    
    // Simulate download completion
    setTimeout(() => {
        btn.innerHTML = '<i class="fas fa-check"></i> Downloaded';
        btn.classList.remove('downloading');
        btn.classList.add('success');
        
        // Reset button after 2 seconds
        setTimeout(() => {
            btn.innerHTML = originalHTML;
            btn.classList.remove('success');
            btn.disabled = false;
        }, 2000);
    }, 1500);
}

// Initialize when DOM is loaded
document.addEventListener('DOMContentLoaded', init);
